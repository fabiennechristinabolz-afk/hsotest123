name: Build and Push Docker Image

# Wann soll das passieren? Immer wenn Code auf 'main' gepusht wird.
on:
  push:
    branches: [ "main" ]
  # Erlaubt dir, es auch manuell im GitHub Tab "Actions" zu starten
  workflow_dispatch:

env:
  # Wir nutzen die GitHub eigene Registry (kostenlos & integriert)
  REGISTRY: ghcr.io
  # Der Name des Images ist der Name des Repos (z.B. FelixMeentken/Agent_Template)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Wichtig: Erlaubnis, das Image hochzuladen

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # Falls dein Dockerfile direkt im Hauptverzeichnis liegt:
          context: .
          # Falls dein Dockerfile noch in einem Unterordner 'managed-chatkit' liegt, nutze stattdessen:
          # context: ./managed-chatkit
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
